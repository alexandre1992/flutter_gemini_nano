name: flutter_gemini_nano
description: >
  Flutter plugin for on-device text and multimodal generation using
  Gemini Nano via ML Kit GenAI on Android.
version: 1.0.2
homepage: https://github.com/alexandre1992/flutter_gemini_nano
repository: https://github.com/alexandre1992/flutter_gemini_nano
issue_tracker: https://github.com/alexandre1992/flutter_gemini_nano/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: br.com.example.flutter_gemini_nano
        pluginClass: FlutterGeminiNanoPlugin

topics:
  - ai
  - generative-ai
  - gemini
  - on-device
  - android
